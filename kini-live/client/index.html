<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO: static fallback metadata before React Helmet renders route-specific tags. -->
    <title>KINi Outsourcing Services | Tax Consultant in Mumbai</title>
    <meta name="description" content="KINi Outsourcing Services provides reliable accounting, income tax return, GST, TDS, company incorporation, licensing and compliance support for businesses and individuals." />
    <meta name="keywords" content="KINi Outsourcing Services, tax consultant Mumbai, accounting services, GST returns, TDS filing, income tax returns, company incorporation, licensing consultant, compliance services" />
    <meta name="author" content="KINi Outsourcing Services" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#050505" />
    <meta name="color-scheme" content="dark" />
    <link rel="canonical" href="https://kinios.in/" />

    <!-- Performance: preconnect and async-load brand fonts without blocking first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Manrope:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Manrope:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Manrope:wght@400;500;600;700&display=swap" /></noscript>

    <!-- Performance: discover the logo used above the fold as early as possible for LCP. -->
    <link rel="preload" as="image" href="/kini-logo.jpeg" fetchpriority="high" />

    <!-- SEO: favicon and install metadata for browser, Android, and iOS surfaces. -->
    <link rel="icon" type="image/jpeg" href="/kini-logo.jpeg" />
    <link rel="apple-touch-icon" href="/kini-logo.jpeg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- SEO: social preview defaults for Facebook, LinkedIn, WhatsApp, and Twitter/X. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="KINi Outsourcing Services" />
    <meta property="og:title" content="KINi Outsourcing Services | Tax Consultant in Mumbai" />
    <meta property="og:description" content="Reliable accounting, tax, GST, TDS, company incorporation, licensing and compliance support for businesses and individuals." />
    <meta property="og:url" content="https://kinios.in/" />
    <meta property="og:image" content="https://kinios.in/kini-logo.jpeg" />
    <meta property="og:image:alt" content="KINi Outsourcing Services logo" />
    <meta property="og:locale" content="en_IN" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KINi Outsourcing Services | Tax Consultant in Mumbai" />
    <meta name="twitter:description" content="Reliable accounting, tax, GST, TDS, company incorporation, licensing and compliance support." />
    <meta name="twitter:image" content="https://kinios.in/kini-logo.jpeg" />
    <meta name="twitter:image:alt" content="KINi Outsourcing Services logo" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

services:
  - type: web
    name: kini-outsourcing-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: CLIENT_ORIGINS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: ADMIN_RESET_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CONSULTANT_EMAIL
        sync: false

  - type: web
    name: kini-outsourcing-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_TURNSTILE_SITE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
